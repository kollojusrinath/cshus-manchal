<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>అప్‌డేట్స్ — చత్రపతి శివాజీ హిందూ ఉత్సవ కమిటీ, మంచాల</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="nav-placeholder"></div>
<div class="page-hero">
  <div class="page-hero-bg" style="background:linear-gradient(135deg,#1A1400,#4A3A00,#6B5000)"></div>
  <div class="page-hero-content">
    <span class="section-tag">Latest News</span>
    <h1 class="section-title">అప్‌డేట్స్ & ప్రకటనలు</h1>
    <p class="section-te">కమిటీ తాజా వార్తలు</p>
  </div>
</div>
<div class="container section-sm">
  <div style="max-width:800px;margin:0 auto;padding-bottom:60px" id="updates-list">
    <div class="loading">లోడ్ అవుతోంది...</div>
  </div>
</div>
<div id="footer-placeholder"></div>
<script src="script.js"></script>
<script>
fetch('content/updates.json').then(r=>r.json()).then(data=>{
  const list=document.getElementById('updates-list');
  if(!data.updates.length){list.innerHTML='<p style="color:var(--muted);text-align:center;padding:80px">త్వరలో అప్‌డేట్స్ వస్తాయి.</p>';return;}
  list.innerHTML=data.updates.map((u,i)=>{
    const d=new Date(u.date);
    return `<div class="update-card fade-in" style="transition-delay:${i*.1}s">
      <div class="update-date-box">
        <span class="day">${d.getDate()}</span>
        <span class="mon">${d.toLocaleString('en',{month:'short'}).toUpperCase()}</span>
      </div>
      <div>
        <div class="update-badge">${u.badge}</div>
        <div class="update-title">${u.title}</div>
        <div class="update-body">${u.body}</div>
        ${u.image?`<img class="update-img" src="${u.image}" alt="${u.title}">`:''}
        <div class="update-te-date">📅 ${u.date_te}</div>
      </div>
    </div>`;
  }).join('');
}).catch(()=>{document.getElementById('updates-list').innerHTML='<p style="color:var(--muted);text-align:center;padding:80px">త్వరలో అప్‌డేట్స్ వస్తాయి.</p>';});
</script>
</body></html>
