<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>సభ్యులు — చత్రపతి శివాజీ హిందూ ఉత్సవ కమిటీ, మంచాల</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="nav-placeholder"></div>
<div class="page-hero">
  <div class="page-hero-bg" style="background:linear-gradient(135deg,#0D1F0D,#1A4020,#2D6040)"></div>
  <div class="page-hero-content">
    <span class="section-tag">Our Team</span>
    <h1 class="section-title">కమిటీ సభ్యులు</h1>
    <p class="section-te">చత్రపతి శివాజీ హిందూ ఉత్సవ కమిటీ, మంచాల</p>
  </div>
</div>
<div class="container section-sm">
  <div class="members-grid" id="members-grid">
    <div class="loading">సభ్యుల వివరాలు లోడ్ అవుతున్నాయి...</div>
  </div>
  <div style="background:linear-gradient(135deg,rgba(122,16,32,.25),rgba(255,107,26,.08));border:1px solid rgba(255,107,26,.25);border-radius:6px;padding:36px;text-align:center;max-width:680px;margin:48px auto 60px">
    <h3 style="font-family:'Tiro Devanagari Sanskrit',serif;font-size:22px;color:var(--gold2);margin-bottom:12px">🚩 మా కమిటీలో చేరండి</h3>
    <p style="font-family:'Tiro Devanagari Sanskrit',serif;font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:24px">శివాజీ స్ఫూర్తిని మంచాలలో వ్యాప్తి చేయాలని అనుకుంటున్నారా? విగ్రహ నిర్మాణంలో భాగస్వాములు అవ్వండి.</p>
    <a href="contact.html" class="btn btn-primary">📞 సంప్రదించండి</a>
  </div>
</div>
<div id="footer-placeholder"></div>
<script src="script.js"></script>
<script>
fetch('content/members.json').then(r=>r.json()).then(data=>{
  document.getElementById('members-grid').innerHTML=data.members.map((m,i)=>`
    <div class="member-card fade-in" style="transition-delay:${i*.07}s">
      <div class="member-avatar">${m.avatar}</div>
      <div class="member-name">${m.name_te}</div>
      <div class="member-name-en">${m.name_en}</div>
      <div class="member-role">${m.role}</div>
      ${m.phone?`<div class="member-phone">${m.phone}</div>`:''}
    </div>`).join('');
}).catch(()=>{document.getElementById('members-grid').innerHTML='<p style="color:var(--muted);padding:60px;text-align:center;grid-column:1/-1">సభ్యుల వివరాలు త్వరలో అందుబాటులో ఉంటాయి.</p>';});
</script>
</body></html>
