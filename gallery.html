<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>గ్యాలరీ — చత్రపతి శివాజీ హిందూ ఉత్సవ కమిటీ, మంచాల</title>
<link rel="stylesheet" href="styles.css">
<style>
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:9999;align-items:center;justify-content:center;padding:20px}
.lightbox.open{display:flex}
.lightbox img{max-width:90vw;max-height:80vh;border-radius:4px;border:1px solid var(--border)}
.lb-close{position:absolute;top:20px;right:24px;color:var(--gold);font-size:36px;cursor:pointer;background:none;border:none;line-height:1}
.lb-cap{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);color:var(--cream);font-family:'Tiro Devanagari Sanskrit',serif;font-size:15px;text-align:center;background:rgba(0,0,0,.6);padding:8px 24px;border-radius:4px;white-space:nowrap}
.upload-note{background:rgba(212,160,23,.05);border:1px dashed var(--border2);border-radius:6px;padding:28px;text-align:center;max-width:640px;margin:0 auto 40px}
.upload-note p{font-family:'Tiro Devanagari Sanskrit',serif;font-size:14px;color:var(--muted);line-height:1.7}
</style>
</head>
<body>
<div id="nav-placeholder"></div>
<div class="page-hero">
  <div class="page-hero-bg" style="background:linear-gradient(135deg,#1A0A00,#3D1A00,#6B2E00)">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8d/Raigad_fort_Maharashtra.jpg/1200px-Raigad_fort_Maharashtra.jpg"
         alt="" onerror="this.style.display='none'" style="opacity:.4">
  </div>
  <div class="page-hero-content">
    <span class="section-tag">Gallery</span>
    <h1 class="section-title">గ్యాలరీ</h1>
    <p class="section-te">చిత్రాలు మరియు జ్ఞాపకాలు</p>
  </div>
</div>
<div class="container section-sm">
  <div class="upload-note fade-in">
    <div style="font-size:36px;margin-bottom:12px">📸</div>
    <p>Admin panel లో photos upload చేయండి — అవి ఇక్కడ automatically కనిపిస్తాయి.<br>
    <strong style="color:var(--gold)">yoursite.com/admin</strong> → Gallery → Add Photos</p>
  </div>
  <div class="gallery-masonry" id="gallery-grid">
    <div class="loading">గ్యాలరీ లోడ్ అవుతోంది...</div>
  </div>
</div>
<div class="lightbox" id="lightbox" onclick="closeLB()">
  <button class="lb-close" onclick="closeLB()">✕</button>
  <img id="lb-img" src="" alt="">
  <div class="lb-cap" id="lb-cap"></div>
</div>
<div id="footer-placeholder"></div>
<script src="script.js"></script>
<script>
const BG_CLASSES=['fort','battle','navy','crown','people'];
function openLB(src,cap){document.getElementById('lb-img').src=src;document.getElementById('lb-cap').textContent=cap;document.getElementById('lightbox').classList.add('open');}
function closeLB(){document.getElementById('lightbox').classList.remove('open');}
fetch('content/gallery.json').then(r=>r.json()).then(data=>{
  const grid=document.getElementById('gallery-grid');
  grid.innerHTML=data.items.map((item,i)=>`
    <div class="gallery-item fade-in" style="transition-delay:${i*.07}s" ${item.image?`onclick="openLB('${item.image}','${item.title}')"`:'style="cursor:default"'}>
      ${item.image
        ?`<img src="${item.image}" alt="${item.title}" onerror="this.outerHTML='<div class=\\'gallery-ph ph-bg ${item.bg_class||BG_CLASSES[i%5]}\\'>${item.emoji||'🏰'}</div>'">`
        :`<div class="gallery-ph ph-bg ${item.bg_class||BG_CLASSES[i%5]}">${item.emoji||'🏰'}</div>`}
      <div class="gallery-overlay"></div>
      <div class="gallery-cap"><h4>${item.title}</h4><p>${item.desc}</p></div>
    </div>`).join('');
}).catch(()=>{document.getElementById('gallery-grid').innerHTML='<p style="color:var(--muted);text-align:center;padding:60px;grid-column:1/-1">గ్యాలరీ త్వరలో అందుబాటులో ఉంటుంది.</p>';});
</script>
</body></html>
